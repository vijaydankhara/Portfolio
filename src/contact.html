<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
  <title>Contact</title>
  <!-- Online CDN Link -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body class="bg-gray-100">
  <!-- Setting Icon Start -->
  <div class="fixed top-[200px] left-0 bg-white px-5 py-3 text-black text-2xl rounded-r-md z-30 ">
    <i class="fa-solid fa-gear bg-white text-black text-2xl rounded-r-md z-50 animate-spin"></i>
  </div>
  <!-- Setting Icon End -->


  <div class="mx-auto py-5 text-center relative">
    <h2 class="font-black text-5xl text-gray-600 m-0 absolute left-[50%] top-24  transform -translate-x-1/2 z-10">GET IN
      <span class="text-vijay-0">TOUCH</span></h2>
    <span
      class="absolute text-8xl tracking-widest left-0 right-0 font-extrabold text-gray-300 translate-y-1/2 opacity-60">CONTACT</span>
  </div>

  <div class="mt-48 mb-10 flex flex-col lg:flex-row justify-evenly">
    <div class="lg:w-1/3 ml-10 pl-10 mb-10 lg:mb-0">
      <h1 class="text-2xl font-bold my-5 text-gray-600">DON'T BE SHY !</h1>
      <p class="mb-5 text-gray-500">Feel free to get in touch with me. I am always open to discussing new projects,
        creative ideas or opportunities to be part of your visions.</p>

      <div class="flex gap-5 pt-3">
        <div>
          <i class="fa-solid fa-envelope text-vijay-0 text-4xl ml-5 h-20 w-20 text-center"></i>
        </div>
        <div>
          <h1 class="text-gray-500 text-sm">MAIL ME</h1>
          <h2 class="text-gray-600 font-bold">vijaydankhara111@gmail.com</h2>
        </div>
      </div>

      <div class="flex gap-5 pt-3">
        <div>
          <i class="fa fa-phone-square text-vijay-0 text-4xl ml-5 h-20 w-20 text-center mt-2"></i>
        </div>
        <div>
          <h1 class="text-gray-500 text-sm">CALL ME</h1>
          <h2 class="text-gray-600 font-bold">+91 9737383193</h2>
        </div>
      </div>

      <div class="pl-10 gap-5 flex flex-wrap">
        <i
          class="fa-brands fa-facebook-f bg-gray-200 hover:bg-vijay-0 hover:text-white h-12 w-12 text-center rounded-full p-4 flex justify-center"></i>
        <i
          class="fa-brands fa-twitter bg-gray-200 hover:bg-vijay-0 hover:text-white h-12 w-12 text-center rounded-full p-4 flex justify-center"></i>
        <i
          class="fa-brands fa-youtube bg-gray-200 hover:bg-vijay-0 hover:text-white h-12 w-12 text-center rounded-full p-4 flex justify-center"></i>
        <i
          class="fa-brands fa-dribbble bg-gray-200 hover:bg-vijay-0 hover:text-white h-12 w-12 text-center rounded-full p-4 flex justify-center"></i>
      </div>
    </div>

    <div class="lg:w-1/2 w-full pr-16">
      <div class="flex flex-wrap justify-evenly mt-5">
        <input
          class="w-full md:w-44 px-4 mb-6 py-2 rounded-full font-medium bg-gray-100 border border-gray-300 placeholder-gray-500 text-sm focus:outline-none focus:border-vijay-0"
          type="text" placeholder="YOUR NAME">
        <input
          class="w-full md:w-44 px-4 mb-6 rounded-full font-medium bg-gray-100 border border-gray-300 placeholder-gray-500 text-sm focus:outline-none focus:border-vijay-0"
          type="email" placeholder="YOUR EMAIL">
        <input
          class="w-full md:w-44 px-4 mb-6 rounded-full font-medium bg-gray-100 border border-gray-300 placeholder-gray-500 text-sm focus:outline-none focus:border-vijay-0"
          type="text" placeholder="YOUR SUBJECT">
      </div>

      <div class="flex justify-start">
        <textarea placeholder="YOUR MESSAGE"
          class="w-[93%] ml-5 p-4 rounded-2xl bg-gray-100 border border-gray-300 h-48 focus:outline-none focus:border-vijay-0"></textarea>
      </div>

      <div class="inline-flex items-center mt-10 ml-5 border border-vijay-0 hover:bg-vijay-0 font-bold rounded-full transition duration-700">
        <a href="#" class="inline-block text-gray-700 hover:text-white py-2 px-4 rounded-full transition-all">SEND MESSAGE</a>
        <div class="flex items-center justify-center w-14 h-14 bg-vijay-0 rounded-full transition duration-700">
          <i class="fa-solid fa-paper-plane text-white text-2xl"></i>
        </div>
      </div>
    </div>
  </div>


  <!-- navbar -->
  <div class=" fixed grid grid-cols-1 grid-rows-4 right-8 top-20 space-y-4">

    <div class="flex flex-col space-y-4">
      <a href=""
        class="bg-gray-300 hover:bg-vijay-0 hover:text-white mb-8 h-12 w-12 text-center text-2xl rounded-full p-4 flex justify-center"><i
          class="fa fa-moon"></i></a>
    </div>

    <div class="flex flex-col space-y-4">
      <a href="home.html"
        class="bg-gray-300 hover:bg-vijay-0 hover:text-white h-12 w-12 text-center rounded-full p-4 flex justify-center"><i
          class="fa-solid fa-house-chimney"></i></a>
    </div>

    <div class="flex flex-col space-y-4">
      <a href="about.html"
        class="bg-gray-300 hover:bg-vijay-0 hover:text-white h-12 w-12 text-center rounded-full p-4 flex justify-center"><i
          class="fa fa-user"></i></a>
    </div>

    <div class="flex flex-col space-y-4">
      <a href="portfolio.html"
        class="bg-gray-300 hover:bg-vijay-0 hover:text-white h-12 w-12 text-center rounded-full p-4 flex justify-center"><i
          class="fa fa-briefcase "></i></a>
    </div>

    <div class="flex flex-col space-y-4">
      <a href="contact.html"
        class="bg-gray-300 hover:bg-vijay-0 hover:text-white h-12 w-12 text-center rounded-full p-4 flex justify-center"><i
          class="fa fa-envelope-open"></i></a>
    </div>

    <div class="flex flex-col space-y-4">
      <a href="blog.html"
        class="bg-gray-300 hover:bg-vijay-0 hover:text-white h-12 w-12 text-center rounded-full p-4 flex justify-center"><i
          class="fa fa-comments"></i></a>
    </div>



  </div>
</body>

</html>
